version: '3.9'

services:
  # 数据库服务
  db:
    image: mysql:8.3.0
    command: --mysql-native-password=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: 'Asia/Shanghai'
      MYSQL_DATABASE: 'wewe-rss'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 45s
      interval: 10s
      retries: 10
    networks:
      - wewe-network

  # WeWe RSS 主服务
  wewerss:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: wewe-rss
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-123456}@db:3306/wewe-rss?schema=public&connect_timeout=30&pool_timeout=30&socket_timeout=30
      - AUTH_CODE=${AUTH_CODE:-wewerss123}
      - FEED_MODE=${FEED_MODE:-fulltext}
      - CRON_EXPRESSION=${CRON_EXPRESSION:-35 5,17 * * *}
      - MAX_REQUEST_PER_MINUTE=${MAX_REQUEST_PER_MINUTE:-60}
      - SERVER_ORIGIN_URL=${SERVER_ORIGIN_URL:-http://localhost:4000}
      - NODE_ENV=production
      - HOST=0.0.0.0
    volumes:
      - ./data:/app/data
    networks:
      - wewe-network

  # Python服务 (MD转JSON和Webhook处理)
  python-service:
    build:
      context: ./python-scripts
      dockerfile: Dockerfile.python
    container_name: wewe-python
    restart: always
    ports:
      - "5001:5001"  # API服务端口
    environment:
      - FEISHU_SUMMARY_WEBHOOK_URL=${FEISHU_SUMMARY_WEBHOOK_URL}
      - FEISHU_MD_TO_JSON_WEBHOOK_URL=${FEISHU_MD_TO_JSON_WEBHOOK_URL}
      - FEISHU_TABLE_SCHEDULE_TIME=${FEISHU_TABLE_SCHEDULE_TIME:-0 30 9 * * *}
      - ARTICLE_INTERVAL_MINUTES=${ARTICLE_INTERVAL_MINUTES:-0.2}
      - SUMMARY_DELAY_MINUTES=${SUMMARY_DELAY_MINUTES:-2}
      - WEWE_RSS_URL=http://wewerss:4000
      - AUTH_CODE=${AUTH_CODE:-wewerss123}
      - NODE_SERVICE_URL=http://wewerss:4000
    volumes:
      - ./python-scripts:/app
    depends_on:
      - wewerss
    networks:
      - wewe-network

# 定义网络，使服务之间可以通信
networks:
  wewe-network:
    driver: bridge

# 定义持久化卷
volumes:
  db_data: 